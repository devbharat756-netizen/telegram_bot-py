services:
  - type: worker
    name: telegram-bot-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PAYMENT_BOT_TOKEN
        sync: false
      - key: FILE_BOT_TOKEN
        sync: false
      - key: PAYMENT_BOT_USERNAME
        sync: false
      - key: FILE_BOT_USERNAME
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_PAYMENT_LINK
        sync: false
      - key: DATABASE_URL
        sync: false
